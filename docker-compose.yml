services:
  backend:
    build: ./backend
    container_name: smart-meeting-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - FFMPEG_BINARY=ffmpeg
      - MEETING_HISTORY_DB_PATH=/app/data/meeting_history.sqlite3
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: smart-meeting-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
