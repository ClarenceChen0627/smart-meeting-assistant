version: '3.8'

services:
  backend:
    build: ./backend
    container_name: smart-meeting-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: smart-meeting-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
